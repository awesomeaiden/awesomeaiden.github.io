{% extends "base.html" %}
{% block title %}Aiden Gonzalez{% endblock %}
{% block content %}
<div class="jumbotron" id="home-jumbotron">
    <div class="bg-image"></div>
    <div class="container">
        <h1 class="display-3">Aiden Gonzalez</h1>
        <p style="font-size: 20px">Purdue University Computer Engineering Class of 2022</p>
    </div>
</div>
<div class="container_home" id="home-container">
    {% for proj in projects %}
    <div class="project-card" style="background-image: url('{{ images + proj.image }}');
        height: 40vw; width: 40vw; background-size: cover; background-position: center;
        background-repeat: no-repeat; margin: auto; padding: 10px; text-align: center;">
        <h2 class="project-card-title">{{ proj.name }}</h2>
        <h4 class="project-card-desc">{{ proj.desc }}</h4>
    </div>
    {% endfor %}
</div>
{% endblock %}
